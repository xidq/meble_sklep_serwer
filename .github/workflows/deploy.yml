name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- ETAP 1: TESTOWANIE (działa na obu branchach) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRONTEND_SERVER: ${{ secrets.FRONTEND_SERVER }}
          PEPPER_KEY: ${{ secrets.PEPPER_KEY }}
          USERS_DB_ENCRYPTION_KEY: ${{ secrets.USERS_DB_ENCRYPTION_KEY }}
        run: cargo test

  # --- ETAP 2: BUDOWANIE (działa TYLKO na mainie) ---
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' # To jest kluczowe! Buduje tylko na mainie
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FRONTEND_SERVER=${{ secrets.FRONTEND_SERVER }}
            PEPPER_KEY=${{ secrets.PEPPER_KEY }}
            USERS_DB_ENCRYPTION_KEY=${{ secrets.USERS_DB_ENCRYPTION_KEY }}
