name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - master

# To daje wbudowanemu tokenowi GitHuba uprawnienie do robienia merge do gałęzi master
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- ETAP 1: TESTOWANIE (Dla dev i master) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev gcc g++ clang cmake git libsqlite3-dev libavif-dev libheif-dev

      - name: Build and install libheif v1.21.1
        run: |
          git clone --depth 1 --branch v1.21.1 https://github.com/strukturag/libheif.git /tmp/libheif
          cd /tmp/libheif && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install && sudo ldconfig
          rm -rf /tmp/libheif

      - name: Create DB, Migrations and Files directories
        run: |
          mkdir -p src/api data migrations/data
          touch data/data.db

      - name: Install sqlx-cli and run migrations
        run: |
          cargo install sqlx-cli --no-default-features --features sqlite
          sqlx migrate run --source migrations/data --database-url sqlite:data/data.db

      - name: Run tests
        env:
          DATABASE_URL: sqlite:data/data.db
          FILES_URL: src/api/
          JWT_SECRET_KEY: "super_tajny_klucz_testowy_dla_jwt_o_odpowiedniej_dlugosci_32_bajtow_minimum"
          FRONTEND_SERVER: "http://localhost:3000"
          PEPPER_KEY: "testowy_pepper_do_haszowania"
          USERS_DB_ENCRYPTION_KEY: "testowy_klucz_szyfrowania_bazy_sqlcipher_12345"
        run: cargo test

  # --- ETAP 2: AUTOMATYCZNY MERGE (Tworzy PR i od razu go scala) ---
  merge-dev-to-master:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and merge Pull Request via GitHub CLI
        env:
          # Używamy wbudowanego tokenu opartego o uprawnienia zapisu
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📨 Tworzenie Pull Requesta z dev do master..."
          PR_URL=$(gh pr create \
            --head dev \
            --base master \
            --title "chore: automatic merge dev to master [skip ci]" \
            --body "Automatyczny merge po udanych testach na dev.")
          
          echo "✅ PR utworzony: $PR_URL"
          
          echo "🔀 Automatyczne scalanie PR..."
          gh pr merge "$PR_URL" --merge --admin --delete-branch=false

  # --- ETAP 3: BUDOWANIE (Tylko gdy master dostanie push — czyli po udanym merge) ---
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
#kjhj
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest