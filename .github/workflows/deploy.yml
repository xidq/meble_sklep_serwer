name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- ETAP 1: TESTOWANIE ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🔥 KROK 1: Instalujemy narzędzia i biblioteki dokładnie tak, jak w Twoim Dockerze
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            gcc \
            g++ \
            clang \
            cmake \
            git \
            libsqlite3-dev \
            libavif-dev \
            libheif-dev

      # 🔥 KROK 1.5: Pobieramy, budujemy i instalujemy libheif v1.21.1 (identycznie jak w Dockerze)
      - name: Build and install libheif v1.21.1
        run: |
          git clone --depth 1 --branch v1.21.1 https://github.com/strukturag/libheif.git /tmp/libheif
          cd /tmp/libheif
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          rm -rf /tmp/libheif

      # 🔥 KROK 2: Przygotowujemy strukturę katalogów i plik bazy danych pod testy
      - name: Create DB, Migrations and Files directories
        run: |
          # Tworzymy katalog na pliki
          mkdir -p src/api
          
          # Tworzymy katalog na bazę danych i inicjalizujemy pusty plik bazy
          mkdir -p data
          touch data/data.db
          
          # Tworzymy katalog na migracje (wymagany przez makro sqlx::migrate!)
          mkdir -p migrations/data

      # 🔥 KROK 2.5: Instalujemy sqlx-cli i aplikujemy migracje DO bazy przed kompilacją testów
      - name: Install sqlx-cli and run migrations
        run: |
          # Instalujemy tylko lekki silnik sqlite dla sqlx-cli, żeby nie kompilować całego narzędzia
          cargo install sqlx-cli --no-default-features --features sqlite
          
          # Uruchamiamy migracje na naszej świeżo stworzonej bazie testowej
          sqlx migrate run --source migrations/data --database-url sqlite:data/data.db

      # 🔥 KROK 3: Uruchomienie testów z całkowicie zhardkodowanymi sekretami testowymi
      - name: Run tests
        env:
          # Wszystkie sekrety zostały zhardkodowane bezpiecznymi wartościami testowymi
          DATABASE_URL: sqlite:data/data.db
          FILES_URL: src/api/
          JWT_SECRET_KEY: "super_tajny_klucz_testowy_dla_jwt_o_odpowiedniej_dlugosci_32_bajtow_minimum"
          FRONTEND_SERVER: "http://localhost:3000"
          PEPPER_KEY: "testowy_pepper_do_haszowania"
          USERS_DB_ENCRYPTION_KEY: "testowy_klucz_szyfrowania_bazy_sqlcipher_12345"
        run: cargo test

  # --- ETAP 2: AUTOMATYCZNY MERGE (Tylko po udanych testach na dev) ---
  merge-to-main:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Daje uprawnienia do pushowania zmian z merge do repozytorium
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pobieramy pełną historię gita do prawidłowego merge'owania
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main and push
        run: |
          # 1. Pobierz zdalną gałąź main i stwórz dla niej lokalną referencję
          git fetch origin main:main
          
          # 2. Teraz Git bez problemu przełączy się na lokalne 'main'
          git checkout main
          
          # 3. Wykonaj merge i push
          git merge origin/dev --no-ff -m "chore: auto-merge dev to main [skip ci]"
          git push origin main

  # --- ETAP 3: BUDOWANIE (Tylko po pushu lub merge na main) ---
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest