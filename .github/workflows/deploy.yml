name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- ETAP 1: TESTOWANIE ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 🔥 KROK 1: Instalujemy narzędzia i biblioteki dokładnie tak, jak w Twoim Dockerze
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            gcc \
            g++ \
            clang \
            cmake \
            git \
            libsqlite3-dev \
            libavif-dev \
            libheif-dev

      # 🔥 KROK 1.5: Pobieramy, budujemy i instalujemy libheif v1.21.1 (identycznie jak w Dockerze)
      - name: Build and install libheif v1.21.1
        run: |
          git clone --depth 1 --branch v1.21.1 https://github.com/strukturag/libheif.git /tmp/libheif
          cd /tmp/libheif
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          rm -rf /tmp/libheif

      # 🔥 KROK 2: Przygotowujemy strukturę katalogów pod bazę danych i pliki dla testów
      - name: Create DB and Files directories
        run: |
          mkdir -p data
          mkdir -p src/api

      - name: Run tests
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRONTEND_SERVER: ${{ secrets.FRONTEND_SERVER }}
          PEPPER_KEY: ${{ secrets.PEPPER_KEY }}
          USERS_DB_ENCRYPTION_KEY: ${{ secrets.USERS_DB_ENCRYPTION_KEY }}
          FILES_URL: src/api/ # upewniamy się, że testy widzą tę zmienną ścieżki
        run: cargo test

  # --- ETAP 2: AUTOMATYCZNY MERGE (Tylko po udanych testach na dev) ---
  merge-to-main:
    needs: test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Daje uprawnienia do pushowania zmian z merge do repozytorium
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pobieramy pełną historię gita do prawidłowego merge'owania
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge dev into main and push
        run: |
          git checkout main
          git merge origin/dev --no-ff -m "chore: auto-merge dev to main [skip ci]"
          git push origin main

  # --- ETAP 3: BUDOWANIE (Tylko po pushu lub merge na main) ---
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest