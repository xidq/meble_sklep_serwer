name: CD - Deploy Master

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            FRONTEND_SERVER=${{ secrets.FRONTEND_SERVER }}
            PEPPER_KEY=${{ secrets.PEPPER_KEY }}
            USERS_DB_ENCRYPTION_KEY=${{ secrets.USERS_DB_ENCRYPTION_KEY }}
            FILES_URL=${{ secrets.FILES_URL }}
            CURRENT_RUST_SERVER_PORT=${{ secrets.CURRENT_RUST_SERVER_PORT }}
